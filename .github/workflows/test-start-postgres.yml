name: test start-postgres

on:
  push:
    branches: [main]
    paths:
      - .github/actions/start-postgres/**
      - .github/workflows/test-start-postgres.yml
  pull_request:
    paths:
      - .github/actions/start-postgres/**
      - .github/workflows/test-start-postgres.yml

jobs:
  smoke:
    # The interesting target for this action is ARC, but org runner groups
    # block self-hosted runners on public repos. Smoke runs hosted-only; ARC
    # behavior is exercised by downstream callers (private repos).
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/start-postgres
        with:
          version: "16"
          database: smoke_db
          password: "pa'ssword"
      - shell: bash
        run: |
          set -euo pipefail
          psql -h localhost -U postgres -d postgres -Atqc "SELECT 1"
          psql -h localhost -U postgres -d smoke_db -Atqc "SELECT current_database()"
