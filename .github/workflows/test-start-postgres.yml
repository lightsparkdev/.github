name: Test Start Postgres

on:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start postgres
        uses: ./.github/actions/start-postgres
        with:
          version: "16"
          database: smoke_db
          password: "pa'ssword"

      - name: Verify postgres is usable
        shell: bash
        run: |
          set -euo pipefail
          psql -h localhost -U postgres -d postgres -Atqc "SELECT 1"
          psql -h localhost -U postgres -d smoke_db -Atqc "SELECT current_database()"
