name: test start-postgres

on:
  push:
    branches: [main]
    paths:
      - .github/actions/start-postgres/**
      - .github/workflows/test-start-postgres.yml
  pull_request:
    paths:
      - .github/actions/start-postgres/**
      - .github/workflows/test-start-postgres.yml

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        # GH-hosted and ARC behave differently — hosted images bake in the
        # postgres user, ARC runners do not. Both must work.
        runner: [ubuntu-24.04, arc-runner-4]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/start-postgres
        with:
          version: "16"
          database: smoke_db
          password: "pa'ssword"
      - shell: bash
        run: |
          set -euo pipefail
          psql -h localhost -U postgres -d postgres -Atqc "SELECT 1"
          psql -h localhost -U postgres -d smoke_db -Atqc "SELECT current_database()"
